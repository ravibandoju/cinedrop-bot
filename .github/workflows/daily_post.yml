name: Daily Instagram Movie Post

# Trigger: Run at 9:00 AM UTC every day
on:
  schedule:
    - cron: '0 9 * * *'
  # Allow manual trigger from Actions tab for testing
  workflow_dispatch:

jobs:
  post_movie:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3: Install dependencies (with fresh pip)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt

      # Step 4: Configure Git for commit/push
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # Step 5: Run the main script
      - name: Run movie post script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      # Step 6: Commit and push updated posted_movies.json
      - name: Commit and push history
        run: |
          if git diff --quiet posted_movies.json; then
            echo "No changes to posted_movies.json"
          else
            git add posted_movies.json
            git commit -m "Auto: Update posted movies history [skip ci]"
            git push
          fi
        continue-on-error: true

      # Step 7: Print final status
      - name: Print job status
        if: always()
        run: |
          echo "Job completed with status: ${{ job.status }}"
