name: Daily Movie Post

on:
  schedule:
    - cron: '0 14 * * 1'    # Monday    14:00 UTC = 19:30 IST  — Recommendation
    - cron: '0 7 * * 2'     # Tuesday   07:00 UTC = 12:30 IST — Hot Take
    - cron: '0 15 * * 3'    # Wednesday 15:00 UTC = 20:30 IST — Dialogue
    - cron: '0 14 * * 4'    # Thursday  14:00 UTC = 19:30 IST — Mood Pick
    - cron: '0 12 * * 5'    # Friday    12:00 UTC = 17:30 IST — Trivia
    - cron: '0 5 * * 6'     # Saturday  05:00 UTC = 10:30 IST — List
    - cron: '0 15 * * 0'    # Sunday    15:00 UTC = 20:30 IST — Rating
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-open-sans
          fc-cache -fv

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Run movie post script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HISTORY_REPO_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python main.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::CineDrop post FAILED on $(TZ='Asia/Kolkata' date +'%A %I:%M %p IST')"
          echo "::error::Check Instagram token, TMDb API, or Groq API keys"
